<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6.0 投資計畫控台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-active { background: white; color: #0f172a !important; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        /* 彈窗動畫 */
        #edit-modal { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 text-slate-900">

    <div id="app" class="max-w-xl mx-auto">
        <!-- Header -->
        <div class="bg-slate-900 p-6 text-white sticky top-0 z-50 shadow-xl">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-black italic tracking-tighter text-blue-400">6.0 PLAN</h1>
                <div class="text-xs bg-blue-600/30 border border-blue-500/50 px-2 py-0.5 rounded text-blue-200 font-bold uppercase tracking-widest">Live</div>
            </div>
            <p id="total-value-display" class="text-slate-400 text-base mt-2 font-bold font-mono tracking-wide">載入中...</p>
            
            <!-- 進度條 -->
            <div class="mt-5 bg-slate-800/80 p-4 rounded-2xl border border-slate-700 shadow-inner">
                <div class="flex justify-between items-end mb-2">
                    <div class="flex items-center">
                        <span class="text-lg mr-2">🎯</span>
                        <span class="text-xs text-slate-300 font-bold tracking-wider">邁向千萬資產</span>
                    </div>
                    <div class="text-sm font-black text-emerald-400" id="goal-percentage">--%</div>
                </div>
                <div class="w-full bg-slate-900 h-2.5 rounded-full overflow-hidden ring-1 ring-slate-700">
                    <div id="goal-progress-bar" class="bg-gradient-to-r from-blue-500 via-teal-400 to-emerald-400 h-full rounded-full transition-all duration-1000 w-0"></div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex mt-6 bg-white/10 p-1 rounded-xl text-sm font-bold backdrop-blur-md overflow-x-auto no-scrollbar gap-1">
                <button onclick="switchTab('diagnosis')" id="btn-diagnosis" class="flex-none px-4 py-2.5 rounded-lg transition-all tab-active">配置分析</button>
                <button onclick="switchTab('plan')" id="btn-plan" class="flex-none px-4 py-2.5 rounded-lg transition-all text-slate-400">定期計畫</button>
                <button onclick="switchTab('calculator')" id="btn-calculator" class="flex-none px-4 py-2.5 rounded-lg transition-all text-slate-400">財富願景</button>
            </div>
        </div>

        <!-- Tab: Diagnosis -->
        <div id="tab-diagnosis" class="p-4 space-y-6">
            <section class="bg-white p-6 rounded-3xl shadow-md border border-slate-100">
                <div id="asset-bar" class="flex h-10 w-full rounded-full overflow-hidden bg-slate-100 ring-4 ring-slate-50"></div>
                <div id="asset-legend" class="grid grid-cols-2 gap-4 mt-6 text-xs font-black text-slate-600"></div>
            </section>
            <div id="holdings-list" class="space-y-4 px-2"></div>
        </div>

        <!-- Tab: Plan -->
        <div id="tab-plan" class="hidden p-4 space-y-4">
            <div id="plan-list" class="space-y-3"></div>
        </div>

        <!-- Tab: Calculator -->
        <div id="tab-calculator" class="hidden p-4 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-md space-y-6">
                <div>
                    <div class="flex justify-between mb-2 text-xs font-black text-slate-400 uppercase">預期年化報酬 <span id="val-rate" class="text-blue-600 text-lg">8%</span></div>
                    <input type="range" id="input-rate" min="1" max="15" value="8" oninput="calculate()" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer">
                </div>
                <div>
                    <div class="flex justify-between mb-2 text-xs font-black text-slate-400 uppercase">投資年限 <span id="val-years" class="text-blue-600 text-lg">10年</span></div>
                    <input type="range" id="input-years" min="1" max="35" value="10" oninput="calculate()" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

            <!-- 預估總額卡片 (字體大小優化) -->
            <div class="bg-white rounded-[2.5rem] p-8 text-center shadow-xl border-2 border-blue-50">
                <div class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">預估資產總額展望</div>
                <div id="res-total" class="text-4xl sm:text-5xl font-black mb-8 text-slate-900 tracking-tighter break-words">$---</div>
                <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-8 text-left text-xs">
                    <div>
                        <div class="text-slate-400 mb-1">本金增值</div>
                        <div id="res-initial" class="font-bold text-slate-700">---</div>
                    </div>
                    <div class="border-l border-slate-100 pl-4">
                        <div class="text-slate-400 mb-1">投入累積</div>
                        <div id="res-monthly" class="font-bold text-slate-700">---</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 浮動編輯按鈕 -->
    <button onclick="toggleModal(true)" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl z-[60] active:scale-90 transition-transform">
        ⚙️
    </button>

    <!-- 編輯彈窗 -->
    <div id="edit-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl">
            <h3 class="text-xl font-black mb-6 flex items-center"><span class="mr-2">📝</span> 修改核心數據</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase mb-2">目前資產總額 (本金)</label>
                    <input type="number" id="edit-principal" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-mono font-bold">
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase mb-2">每月投入金額</label>
                    <input type="number" id="edit-monthly" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-mono font-bold">
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="toggleModal(false)" class="flex-1 py-3 font-bold text-slate-400">取消</button>
                <button onclick="saveData()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200">儲存更新</button>
            </div>
        </div>
    </div>

    <script>
        // 初始數據
        let CONFIG = {
            principal: 4657715,
            monthly: 60000,
            goal: 10000000
        };

        const detailedHoldings = [
            { id: '2330', name: '台積電', value: 1950000, color: '#ef4444' }, 
            { id: '0050', name: '元大台灣50', value: 1108800, color: '#f87171' },
            { id: '00757', name: '統一FANG+', value: 333750, color: '#3b82f6' },
            { id: '00955', name: '中信日本商社', value: 167602, color: '#f97316' },
            { id: '00646', name: '元大S&P500', value: 54483, color: '#2563eb' }
        ];

        const sipPlan = [
            { name: '元大 S&P 500', amount: 20000, color: '#2563eb' },
            { name: '富邦 NASDAQ', amount: 12000, color: '#1d4ed8' },
            { name: '新光美國電力', amount: 12000, color: '#eab308' },
            { name: '中信日本商社', amount: 12000, color: '#f97316' },
            { name: '統一台股增長', amount: 4000, color: '#10b981' }
        ];

        const formatCurrency = (num) => '$' + Math.round(num).toLocaleString();

        function switchTab(tab) {
            ['diagnosis', 'plan', 'calculator'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}`).classList.remove('tab-active', 'text-slate-400');
                document.getElementById(`btn-${t}`).classList.add('text-slate-400');
            });
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('tab-active');
        }

        function toggleModal(show) {
            const modal = document.getElementById('edit-modal');
            if(show) {
                document.getElementById('edit-principal').value = CONFIG.principal;
                document.getElementById('edit-monthly').value = CONFIG.monthly;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } else {
                modal.classList.add('hidden');
            }
        }

        function saveData() {
            CONFIG.principal = Number(document.getElementById('edit-principal').value);
            CONFIG.monthly = Number(document.getElementById('edit-monthly').value);
            updateUI();
            toggleModal(false);
        }

        function updateUI() {
            document.getElementById('total-value-display').innerText = 'PORTFOLIO: ' + formatCurrency(CONFIG.principal);
            const progress = (CONFIG.principal / CONFIG.goal) * 100;
            document.getElementById('goal-percentage').innerText = progress.toFixed(1) + '%';
            document.getElementById('goal-progress-bar').style.width = progress + '%';
            calculate();
        }

        function calculate() {
            const r = document.getElementById('input-rate').value / 100 / 12;
            const y = document.getElementById('input-years').value;
            const n = y * 12;
            document.getElementById('val-rate').innerText = document.getElementById('input-rate').value + '%';
            document.getElementById('val-years').innerText = y + '年';
            
            const initialGrowth = CONFIG.principal * Math.pow(1 + r, n);
            const monthlyGrowth = CONFIG.monthly * ((Math.pow(1 + r, n) - 1) / r);
            const total = initialGrowth + monthlyGrowth;
            
            document.getElementById('res-total').innerText = formatCurrency(total);
            document.getElementById('res-initial').innerText = formatCurrency(initialGrowth);
            document.getElementById('res-monthly').innerText = formatCurrency(monthlyGrowth);
        }

        function init() {
            // 初始化清單
            const planList = document.getElementById('plan-list');
            sipPlan.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex items-center p-4 bg-white rounded-2xl border border-slate-100 shadow-sm";
                div.innerHTML = `<div class="w-1 h-8 rounded-full mr-4" style="background:${item.color}"></div>
                                 <div class="flex-1 font-bold text-slate-700">${item.name}</div>
                                 <div class="font-mono font-black">${formatCurrency(item.amount)}</div>`;
                planList.appendChild(div);
            });
            updateUI();
        }

        window.onload = init;
    </script>
</body>
</html>
